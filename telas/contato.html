                </nav>
            </div>
        </header>

        <main>
            <ul class="contatos-titulo">
                <li class="contatos-item">Contatos</li>
            </ul>

            <!-- DIV DE RETORNO -->
            <div id="formRetorno" class="divRetorno">
                <p id="textoRetorno" class="texto-contatos"></p>

            </div>
            <div id="formulario">
                <p class="texto-contatos">
                    Fale conosco!!!
                    <br><br>
                     Você pode nos encontrar no Instagram, no WhatsApp ou preencher o formulário abaixo.
                </p>
                <form id="frmContato">
                    <fieldset>
                        <legend>Dados Pessoais</legend>
                        <label>* Nome e sobrenome</label>
                        <input type="text" id="nomesobrenome" name="nomesobrenome" class="input-padrao" required>

                        <label>E-mail</label>
                        <input type="email" id="email" name="email" class="input-padrao" placeholder="seuemail@dominio.com">

                        <label>Telefone</label>
                        <input type="tel" id="telefone" name="teleofone" class="input-padrao" placeholder="(XX) XXXXX-XXXX">

                        <label>* Mensagem</label>
                        <textarea cols="70" rows="10"
                        id="mensagem" class="input-padrao" required></textarea>

                        <label>Como prefere o nosso contato?
                            <input type="radio" value="radio-email" name="Contato"> E-mail
                            <input type="radio" value="radio-telefone" name="Contato"> Telefone
                            <input type="radio" value="radio-whatsapp" name="Contato"> Whatsapp
                        </label>

                        <br>
                        <label>Qual o motivo do seu contato?
                            <select>    
                                <option>Selecione</option>
                                <option>Dúvida</option>
                                <option>Sugestão</option>
                                <option>Elogio</option>
                                <option>Reclamação</option>

                            </select>
                        </label>
                        <br>
                </fieldset>

                <label><input type="checkbox" class="chk"> Gostaria de receber nossas novidades por e-mail? </label>

                <input type="submit" id="enviar" value="Enviar formulário" class="enviar">

                </form>
            </div>
        </main>
